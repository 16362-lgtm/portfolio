<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Portfolio - Crimson Edition</title>
    <style>
        /* สไตล์พื้นหลังโทนสีเลือดหมูเข้มสไตล์วิศวะ */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Mitr';
            background: linear-gradient(135deg, #2d0b0e 0%, #1a0507 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
        }

        /* แถบเมนูด้านบน (Navigation Bar) */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(45, 11, 14, 0.95);
            backdrop-filter: blur(8px);
            padding: 15px 0;
            text-align: center;
            z-index: 1000;
            border-bottom: 2px solid #a31d1d;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff4d4d;
            text-shadow: 0 0 8px rgba(255, 77, 77, 0.6);
        }

        /* ส่วนหน้าปก (Hero Section / Cover) */
        .hero-banner {
            position: relative;
            height: 60vh; /* ความสูงหน้าปก */
            min-height: 400px;
            background: linear-gradient(rgba(26, 5, 7, 0.6), rgba(26, 5, 7, 0.85)), 
                        url('http://googleusercontent.com/image_generation_content/0') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            margin-top: 50px; /* หลบแถบเมนู */
            border-bottom: 4px solid #a31d1d;
        }

        .hero-banner h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            color: #ffffff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }

        .hero-banner p {
            font-size: 1.5rem;
            margin: 0 0 25px 0;
            color: #ffb3b3;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }

        .hero-btn {
            color: #ffffff;
            background: #a31d1d;
            border: 2px solid #ffffff;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .hero-btn:hover {
            background: #ffffff;
            color: #2d0b0e;
            transform: scale(1.05);
        }

        /* จัดการกล่องเนื้อหาแต่ละส่วน */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        section {
            background: rgba(58, 16, 20, 0.6);
            border-left: 4px solid #a31d1d;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0 12px 12px 0;
            padding: 30px;
            margin-bottom: 35px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        section:hover {
            transform: translateX(5px);
            background: rgba(58, 16, 20, 0.85);
            border-left-color: #ff4d4d;
            box-shadow: 0 4px 25px rgba(163, 29, 29, 0.3);
        }

        h2 {
            color: #ffb3b3;
            margin-top: 0;
            font-size: 22px;
            letter-spacing: 0.5px;
        }

        p, li {
            line-height: 1.7;
            font-size: 16px;
            color: #f0e6e6;
        }

        ul {
            padding-left: 20px;
            list-style-type: square;
        }

        /* ปุ่มลิงก์ติดต่อสไตล์ป้ายวิศวะ */
        .contact-link {
            display: inline-block;
            color: #ffffff;
            background: #a31d1d;
            border: 1px solid #7a1111;
            padding: 10px 24px;
            margin: 5px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .contact-link:hover {
            background: #ff4d4d;
            border-color: #a31d1d;
            box-shadow: 0 0 12px rgba(255, 77, 77, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <nav>
        <a href="https://example.com/about" target="_blank">ประวัติส่วนตัว</a>
        <a href="https://example.com/education" target="_blank">ประวัติการศึกษา</a>
        <a href="https://example.com/works" target="_blank">ผลงานและกิจกรรม</a>
        <a href="https://example.com/skills" target="_blank">ความสามารถและทักษะ</a>
        <a href="https://example.com/awards" target="_blank">เกียรติบัตรและรางวัล</a>
        <a href="https://example.com/contact" target="_blank">ช่องทางการติดต่อ</a>
    </nav>

    <header class="hero-banner">
        <h1>MY ENGINEERING PORTFOLIO</h1>
        <p>ยินดีต้อนรับสู่หน้ารวบรวมผลงานและประวัติส่วนตัว</p>
        <a href="#about" class="hero-btn">ดูข้อมูลด้านล่าง</a>
    </header>

    <div class="container">


        
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">

    <title>Engineering Portfolio - Crimson Edition</title>
    <style>
        /* สไตล์พื้นหลังโทนสีเลือดหมูเข้มสไตล์วิศวะ */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Mitr';
            background: linear-gradient(135deg, #2d0b0e 0%, #1a0507 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        /* แถบเมนูด้านบน (Navigation Bar) */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(45, 11, 14, 0.9);
            backdrop-filter: blur(8px);
            padding: 15px 0;
            text-align: center;
            z-index: 1000;
            border-bottom: 2px solid #a31d1d; /* เส้นใต้เมนูสีแดงวิศวะสว่าง */
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }

        /* เอฟเฟกต์ชี้เมาส์ที่เมนู */
        nav a:hover {
            color: #ff4d4d;
            text-shadow: 0 0 8px rgba(255, 77, 77, 0.6);
        }

        /* จัดการกล่องเนื้อหาแต่ละส่วน */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 110px 20px 40px 20px;
        }

        section {
            background: rgba(58, 16, 20, 0.6);
            border-left: 4px solid #a31d1d; /* เส้นเน้นหนาด้านซ้ายสีเลือดหมูสว่าง */
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0 12px 12px 0;
            padding: 30px;
            margin-bottom: 35px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        section:hover {
            transform: translateX(5px);
            background: rgba(58, 16, 20, 0.85);
            border-left-color: #ff4d4d; /* เปลี่ยนเป็นสีแดงสว่างขึ้นเมื่อชี้ */
            box-shadow: 0 4px 25px rgba(163, 29, 29, 0.3);
        }

        h2 {
            color: #ffb3b3; /* สีแดงอ่อน/ชมพูพาสเทลเพื่อให้อ่านง่ายบนพื้นเข้ม */
            margin-top: 0;
            font-size: 22px;
            letter-spacing: 0.5px;
        }

        p, li {
            line-height: 1.7;
            font-size: 16px;
            color: #f0e6e6; /* สีขาวนวลถนอมสายตา */
        }

        ul {
            padding-left: 20px;
            list-style-type: square; /* หัวข้อสี่เหลี่ยมสไตล์โครงสร้าง */
        }

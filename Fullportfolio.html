<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Portfolio</title>
    <style>
        /* สไตล์พื้นหลังโทนวิศวกรรม (น้ำเงินเข้มอุตสาหกรรม) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Mitr';
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        /* แถบเมนูด้านบน (Navigation Bar) */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            padding: 15px 0;
            text-align: center;
            z-index: 1000;
            border-bottom: 2px solid #f97316; /* เส้นใต้เมนูสีส้มวิศวะ */
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }

        /* เอฟเฟกต์ชี้เมาส์ที่เมนู (เปลี่ยนเป็นสีส้มเทคนิค) */
        nav a:hover {
            color: #f97316;
            text-shadow: 0 0 8px rgba(249, 115, 22, 0.6);
        }

        /* จัดการกล่องเนื้อหาแต่ละส่วน */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 110px 20px 40px 20px;
        }

        section {
            background: rgba(30, 41, 59, 0.7);
            border-left: 4px solid #f97316; /* เส้นขอบหนาด้านซ้ายสไตล์โครงสร้าง */
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0 12px 12px 0;
            padding: 30px;
            margin-bottom: 35px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }
